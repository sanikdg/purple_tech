version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sis-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin_password}
      MONGO_INITDB_DATABASE: store-intelligence
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - sis-network

  mongo-express:
    image: mongo-express:latest
    container_name: sis-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin_password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin_password}@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - sis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sis-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: 5000
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin_password}@mongodb:27017/store-intelligence?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      - mongodb
    networks:
      - sis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sis-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - sis-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: sis-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8000
      AI_SERVICE_BACKEND_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - sis-network

volumes:
  mongodb_data:

networks:
  sis-network:
    driver: bridge
